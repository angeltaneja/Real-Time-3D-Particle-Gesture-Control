<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kinetic Nebula | Super-Nova Edition</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Orbitron', sans-serif; color: #fff; }
        #container { width: 100vw; height: 100vh; background: #000; }
        .hud { 
            position: absolute; top: 40px; left: 40px; pointer-events: none; z-index: 100;
            border-left: 2px solid #00d4ff; padding-left: 20px;
        }
        #video-feed { position: absolute; bottom: 20px; right: 20px; width: 150px; opacity: 0; pointer-events: none; }
        h1 { margin: 0; font-size: 0.7rem; letter-spacing: 3px; color: #00d4ff; }
        .mode-text { font-size: 2.2rem; margin: 10px 0; font-weight: 700; text-transform: uppercase; text-shadow: 0 0 15px #00d4ff; }
        .timer-bar { width: 200px; height: 2px; background: rgba(0,212,255,0.2); margin-top: 10px; }
        #progress { width: 0%; height: 100%; background: #00d4ff; }
    </style>
</head>
<body>

    <div class="hud">
        <h1 id="ai-status">NEURAL LINK: CONNECTED</h1>
        <div id="current-mode" class="mode-text">SPHERE</div>
        <div class="timer-bar"><div id="progress"></div></div>
    </div>
    
    <video id="video-feed" autoplay playsinline></video>
    <div id="container"></div>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

    <script type="module">
        import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';

        let scene, camera, renderer, points;
        const count = 35000; 
        let currentIdx = 0;
        const modes = ['sphere', 'heart', 'saturn', 'sun', 'flower', 'galaxy', 'butterfly', 'blossoms'];
        
        let targetPos = new Float32Array(count * 3);
        let targetCol = new Float32Array(count * 3);
        let smoothX = 0, smoothY = 0, burst = 0, targetBurst = 0;
        let lastSwitchTime = performance.now();
        const switchInterval = 8000;

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
            camera.position.z = 12;

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('container').appendChild(renderer.domElement);

            const geo = new THREE.BufferGeometry();
            const p = new Float32Array(count * 3);
            const c = new Float32Array(count * 3);
            for(let i=0; i<count*3; i++) { p[i]=(Math.random()-0.5)*15; c[i]=1; }

            geo.setAttribute('position', new THREE.BufferAttribute(p, 3));
            geo.setAttribute('color', new THREE.BufferAttribute(c, 3));

            const mat = new THREE.PointsMaterial({
                size: 0.04, vertexColors: true, transparent: true,
                blending: THREE.AdditiveBlending, depthWrite: false
            });

            points = new THREE.Points(geo, mat);
            scene.add(points);

            setShape('sphere');
            window.addEventListener('resize', onResize);
        }

        function setShape(type) {
            document.getElementById('current-mode').innerText = type;
            for (let i = 0; i < count; i++) {
                let x=0, y=0, z=0, r=1, g=1, b=1;
                const i3 = i * 3;
                const t = Math.random() * Math.PI * 2;

                if (type === 'heart') {
                    x = 2.5 * Math.pow(Math.sin(t), 3);
                    y = 2.0 * Math.cos(t) - 0.7 * Math.cos(2*t) - 0.2 * Math.cos(3*t);
                    z = (Math.random()-0.5) * 1.5; [r,g,b] = [1, 0.1, 0.2];
                } 
                else if (type === 'flower') {
                    const rad = 4 * Math.cos(6 * t);
                    x = rad * Math.cos(t); y = rad * Math.sin(t);
                    z = (Math.random()-0.5) * 0.5; [r,g,b] = [0.9, 0.4, 1];
                }
                else if (type === 'saturn') {
                    if(i < count * 0.4) {
                        const ph = Math.acos(2*Math.random()-1);
                        x=Math.sin(ph)*Math.cos(t)*1.8; y=Math.sin(ph)*Math.sin(t)*1.8; z=Math.cos(ph)*1.8; [r,g,b]=[1,0.6,0.2];
                    } else {
                        const rd = 3.2 + Math.random()*1.8;
                        x=Math.cos(t)*rd; y=Math.sin(t)*rd*0.1; z=Math.sin(t)*rd; [r,g,b]=[0.8,0.8,0.6];
                    }
                }
                else if (type === 'sun') {
                    const ph = Math.acos(2*Math.random()-1);
                    x=Math.sin(ph)*Math.cos(t)*2.8; y=Math.sin(ph)*Math.sin(t)*2.8; z=Math.cos(ph)*2.8; [r,g,b]=[1,0.4,0];
                }
                else if (type === 'galaxy') {
                    const angle = i * 0.1; const rd = 0.4 * angle;
                    x = Math.cos(angle)*rd + (Math.random()-0.5)*2;
                    y = Math.sin(angle)*rd + (Math.random()-0.5)*2;
                    z = (Math.random()-0.5)*2; [r,g,b] = [0.2, 0.5, 1];
                }
                else if (type === 'butterfly') {
                    const exp = (Math.exp(Math.cos(t)) - 2*Math.cos(4*t) - Math.pow(Math.sin(t/12), 5));
                    x = Math.sin(t)*exp; y = Math.cos(t)*exp; z = (Math.random()-0.5); [r,g,b] = [0.1, 1, 0.6];
                }
                else { // Sphere / Blossoms
                    const ph = Math.acos(2*Math.random()-1);
                    x=Math.sin(ph)*Math.cos(t)*4; y=Math.sin(ph)*Math.sin(t)*4; z=Math.cos(ph)*4; 
                    [r,g,b] = (type === 'blossoms') ? [1, 0.8, 0.9] : [0.1, 0.6, 1];
                }

                targetPos[i3]=x; targetPos[i3+1]=y; targetPos[i3+2]=z;
                targetCol[i3]=r; targetCol[i3+1]=g; targetCol[i3+2]=b;
            }
        }

        function setupAI() {
            const video = document.getElementById('video-feed');
            const hands = new Hands({locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`});
            hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.7 });
            hands.onResults((res) => {
                if (res.multiHandLandmarks && res.multiHandLandmarks[0]) {
                    const lm = res.multiHandLandmarks[0];
                    smoothX += ((-(lm[9].x - 0.5) * 22) - smoothX) * 0.15;
                    smoothY += ((-(lm[9].y - 0.5) * 16) - smoothY) * 0.15;
                    points.position.set(smoothX, smoothY, 0);
                    const d = Math.hypot(lm[4].x - lm[8].x, lm[4].y - lm[8].y);
                    targetBurst = d > 0.18 ? (d - 0.18) * 8 : 0;
                }
            });
            new Camera(video, { onFrame: async () => { await hands.send({image: video}); }, width: 640, height: 480 }).start();
        }

        function animate() {
            requestAnimationFrame(animate);
            const now = performance.now();
            const elapsed = now - lastSwitchTime;
            document.getElementById('progress').style.width = Math.min((elapsed / switchInterval) * 100, 100) + "%";
            
            if (elapsed >= switchInterval) {
                currentIdx = (currentIdx + 1) % modes.length;
                setShape(modes[currentIdx]);
                lastSwitchTime = now;
            }

            const p = points.geometry.attributes.position.array;
            const c = points.geometry.attributes.color.array;
            
            burst += (targetBurst - burst) * 0.1;

            for(let i=0; i<count*3; i++) {
                // Morphing with Super-Nova boost
                const target = targetPos[i] * (1 + burst);
                p[i] += (target - p[i]) * 0.08;
                
                // Color Flash: brighten to white when exploding
                const targetC = Math.min(targetCol[i] + burst * 0.5, 1.0);
                c[i] += (targetC - c[i]) * 0.08;
            }
            points.geometry.attributes.position.needsUpdate = true;
            points.geometry.attributes.color.needsUpdate = true;

            points.rotation.y += 0.003;
            renderer.render(scene, camera);
        }

        function onResize() {
            camera.aspect = window.innerWidth/window.innerHeight; camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        init(); setupAI(); animate();
    </script>
</body>
</html>
